<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đăng nhập THPT</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#e9edff;
}

.container{
    width:900px;
    margin:40px auto;
    background:white;
    border-radius:15px;
    padding:40px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);

    display:flex;
    gap:40px;
}

.left{
    width:50%;
}

.right{
    width:50%;
}

h2{
    color:#1e4ea8;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0d5bd7;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0847aa;
}

.captcha-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

#captcha{
    background:#f2f2f2;
    padding:10px 20px;
    font-size:32px;
    font-weight:bold;
    letter-spacing:5px;
    color:#4b6cb7;
    border:1px dashed #999;
    user-select:none;
}

.refresh{
    font-size:28px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <div class="left">

        <h2>ĐĂNG NHẬP</h2>

        <label>Số CCCD/CMND</label>
        <input type="text" placeholder="Nhập CCCD">

        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu">

        <div class="captcha-box">
            <div id="captcha"></div>

            <div class="refresh" onclick="createCaptcha()">
                🔄
            </div>
        </div>

        <label>Mã xác nhận</label>
        <input type="text" id="captchaInput" placeholder="Nhập mã xác nhận">

        <button onclick="checkCaptcha()">
            Đăng nhập
        </button>

    </div>

    <div class="right">

        <h2>THÔNG BÁO</h2>

        <p>
            Thí sinh đăng ký dự thi trực tuyến để xét công nhận tốt nghiệp THPT.
        </p>

        <p>
            Hệ thống cho phép đăng nhập và xác thực mã bảo vệ giống như cổng thi THPT.
        </p>

    </div>

</div>

<script>

let currentCaptcha = "";

function createCaptcha(){

    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    currentCaptcha = "";

    for(let i=0;i<5;i++){
        currentCaptcha += chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("captcha").innerText = currentCaptcha;
}

function checkCaptcha(){

    let input = document.getElementById("captchaInput").value;

    if(input === currentCaptcha){
        alert("Đăng nhập thành công!");
    }
    else{
        alert("Sai mã xác thực!");
        createCaptcha();
    }
}

createCaptcha();

</script>

</body>
</html>
