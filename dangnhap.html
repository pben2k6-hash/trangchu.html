<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Nhập</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Times New Roman;
        }

        body{
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: #ccc;
            width: 500px;
            padding: 30px;
            border: 15px solid green;
        }

        h1{
            margin-bottom: 40px;
            font-size: 50px;
        }

        .input-box{
            margin-bottom: 25px;
        }

        .input-box input{
            width: 100%;
            height: 50px;
            border: none;
            border-bottom: 4px solid red;
            outline: none;
            padding-left: 10px;
            font-size: 20px;
        }

        label{
            font-size: 25px;
        }

        .gender{
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .remember{
            margin-bottom: 30px;
            font-size: 22px;
        }

        button{
            width: 220px;
            height: 70px;
            background: #00cc99;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        button:hover{
            background: #009977;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Đăng nhập</h1>

        <div class="input-box">
            <input type="text">
            <label>Tên đăng nhập</label>
        </div>

        <div class="input-box">
            <input type="password">
            <label>Mật khẩu</label>
        </div>

        <div class="gender">
            <input type="radio" name="gt" checked> Nam <br>
            <input type="radio" name="gt"> Nữ
        </div>

        <div class="remember">
            <input type="checkbox">
            Lưu giá trị đăng nhập
        </div>

        <button>Đăng nhập</button>

    </div>

</body>
</html>
